buildscript {

	repositories {
		// maven本地仓库
		mavenLocal()
		// 添加 Maven 仓库
		maven { url 'https://maven.aliyun.com/nexus/content/groups/htm' }
		maven { url 'https://maven.aliyun.com/nexus/content/repositories/jcenter' }
		maven { url 'https://maven.aliyun.com/nexus/content/repositories/google' }
		maven { url 'https://maven.aliyun.com/nexus/content/repositories/gradle-plugin' }
		maven {
			url "https://plugins.gradle.org/m2/"
		}
		mavenCentral()
	}
}

plugins {
	id 'war'
	id "org.gretty" version "3.0.3"
}

gretty {
	httpPort = 8080
	contextPath = '/'
	// Bumped default Tomcat 9 version to 9.0.6
	// Since version 3.0.0 Gretty no longer supports JDK7, Gradle <5.0, Tomcat 7.x or Tomcat 8.0.x.
	servletContainer = 'tomcat9'

	debugSuspend = false
	// set this lead to runtime exception
	managedClassReload      = false
	recompileOnSourceChange = false
}

tasks.withType(JavaCompile) {
	sourceCompatibility = JavaVersion.VERSION_1_8
	targetCompatibility = JavaVersion.VERSION_1_8
}

[
	compileJava,
	compileTestJava,
	javadoc
]*.options*.encoding = 'UTF-8'

dependencies {
	compileOnly javax_servlet_api
}